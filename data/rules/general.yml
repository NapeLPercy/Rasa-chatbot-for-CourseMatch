version: "3.1"

rules:
  - rule: Greet user
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Say thanks
    steps:
      - intent: thank_you
      - action: utter_thank_you

  - rule: Bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Out of scope fallback (general)
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope
