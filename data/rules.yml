#
version: "3.1"

rules:
- rule: Say hello anytime
  steps:
    - intent: greet
    - action: utter_greet

- rule: Say goodbye anytime
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Thank you response
  steps:
    - intent: thank_you
    - action: utter_thank_you

- rule: Fallback rule
  steps:
    - intent: fallback
    - action: utter_fallback

#form rel rules
- rule: start eligibility form
  steps:
    - intent: affirm
    - action: eligibility_form
    - active_loop: eligibility_form

- rule: submit eligibility form
  condition:
    - active_loop: eligibility_form
  steps:
    - action: eligibility_form
    - active_loop: null
    - action: utter_form_complete

- rule: deny eligibility form
  steps:
    - intent: deny
    - action: utter_goodbye

