version: "3.1"

nlu:
  - intent: greet
    examples: |
      - hi
      - hello
      - hey
      - good morning
      - good evening

  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - see you later
      - exit

  - intent: affirm
    examples: |
      - yes
      - yeah
      - yup
      - sure
      - okay
      - sounds good
      - let's do it

  - intent: thank_you
    examples: |
      - thanks
      - thank you
      - appreciate it

  - intent: ask_what_is_coursematch
    examples: |
      - what is coursematch
      - tell me about coursematch
      - what does coursematch do
      - what does this website do

  - intent: ask_how_it_works
    examples: |
      - how does coursematch work
      - how does this platform work
      - explain how coursematch works

  - intent: ask_aps
    examples: |
      - what is aps
      - explain aps
      - how is aps calculated

  - intent: ask_get_started
    examples: |
      - how do i start
      - how can i use coursematch
      - what should i do first

  - intent: ask_support
    examples: |
      - how do i get help
      - contact support
      - i need assistance

  - intent: ask_pricing
    examples: |
      - how much does coursematch cost
      - is coursematch free
      - what is the price
      - do i have to pay
      - pricing
      - cost of using coursematch

  - intent: fallback
    examples: |
      - asdfasdf
      - random text
      - xyz123
      - I don't know what to say
      - something completely random  

  - intent: ask_aps_computation
    examples: |
      - How do i know my aps
      - How university know my aps
      - how was my aps counted 

- intent: ask_about_personality_profile
  examples: |
    - What is a personality profile?
    - What does the personality profile mean?
    - Tell me about the personality profile.
    - What is the purpose of the personality profile?
    - Why do I need to complete the personality profile?
    - Explain the personality profile.

- intent: ask_how_to_complete_personality_profile
  examples: |
    - How do I fill in the personality profile?
    - How do I complete the personality profile?
    - How should I answer the personality profile?
    - Can you help me complete the personality profile?
    - What's the best way to fill out the personality profile?
    - How do I answer the personality profile questions?
       
# intents and examples that include entities
  - intent: ask_prerequisites
    examples: |
      - what are prerequisites
      - subject requirements
      - do courses need [maths](subject)

  - intent: ask_ai_features
    examples: |
      - what ai features do you have
      - is coursematch ai powered
      - how does ai help [students](user_type)

  - intent: ask_who_is_it_for
    examples: |
      - who is coursematch for
      - is this for [students](user_type)
      - can parents use this

  - intent: provide_aps
    examples: |
      - my aps is [28](aps_score)
      - i got [32](aps_score)
      - aps [25](aps_score)

  - intent: provide_subjects
    examples: |
      - i took [maths](subject) and [physical sciences](subject)
      - my subjects were [mathematics](subject), [physics](subject)
      - i did [life orientation](subject)

# ALL THE SYNONYMS
  - synonym: maths
    examples: |
      - mathematics
      - pure maths
      - math

  - synonym: physical sciences
    examples: |
      - physics
      - phys sci

  - synonym: lo
    examples: |
       - life orientation

  - synonym: english
     examples: |
       - english fallback
       - english first additional language
 
   - synonym: english
     examples: |
       - english fallback
